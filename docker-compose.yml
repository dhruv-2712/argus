services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./reports:/app/reports
      - db-data:/app/data
    env_file:
      - .env
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  db-data:
